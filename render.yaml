services:
  # ── Backend: Node.js API ──────────────────────────────────────────────────
  - type: web
    name: food-restaurant-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://food-restaurant-frontend.onrender.com
      # Set the following secrets manually in the Render dashboard:
      # DB_URI, JWT_SECRET, JWT_EXPIRES, JWT_EXPIRES_TIME,
      # CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET,
      # STRIPE_SECRET_KEY, STRIPE_API_KEY, GROQ_API_KEY

  # ── Frontend: Vite / React Static Site ───────────────────────────────────
  - type: web
    name: food-restaurant-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://food-restaurant-api.onrender.com/api
